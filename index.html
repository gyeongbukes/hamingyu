<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0">
  <title>M & H Wedding</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { margin: 0; padding: 0; background-color: #FAFAFA; -webkit-tap-highlight-color: transparent; color: #262626; overflow-x: hidden; font-family: 'Pretendard', sans-serif; }
    ::-webkit-scrollbar { display: none; }
    
    @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-5px);} 50% {transform: translateX(5px);} 75% {transform: translateX(-5px);} }
    .shake { animation: shake 0.4s ease-in-out; }
    @keyframes pop { 0% {transform: scale(0.8); opacity: 0;} 100% {transform: scale(1); opacity: 1;} }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes confettiFall { 0% { transform: translateY(-10vh) rotate(0deg); } 100% { transform: translateY(100vh) rotate(360deg); } }
    
    @keyframes floatUp {
      0% { transform: translateY(0) scale(0.5); opacity: 1; }
      100% { transform: translateY(-150px) scale(1.2); opacity: 0; }
    }
    .floating-heart {
      position: absolute; animation: floatUp 1.2s ease-out forwards; pointer-events: none; font-size: 28px; z-index: 50;
    }

    .main-photo-container {
      position: relative; width: 100%; overflow: hidden; background-color: #000;
    }
    .main-photo-blur-bg {
      position: absolute; inset: -20px; background-size: cover; background-position: center; filter: blur(15px); opacity: 0.5; transform: scale(1.1);
    }
    .main-photo-img {
      position: relative; width: 100%; display: block; object-fit: contain;
    }

    @keyframes bounceScroll {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(10px); }
    }
    .scroll-indicator {
      position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      animation: bounceScroll 2s infinite ease-in-out;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const DB_URL = "https://sungjang2025-30160-default-rtdb.asia-southeast1.firebasedatabase.app";
    
    const getImg = (exactFileName) => {
      const bucket = "sungjang2025-30160.firebasestorage.app";
      const path = encodeURIComponent(`개인/${exactFileName}`);
      return `https://firebasestorage.googleapis.com/v0/b/${bucket}/o/${path}?alt=media`;
    };

    const AUDIO_SRC = "https://firebasestorage.googleapis.com/v0/b/sungjang2025-30160.firebasestorage.app/o/%EA%B0%9C%EC%9D%B8%2Fantifreez.mp3?alt=media";

    const PHOTO_LIST = [
      "1.jpg", "2.JPG", "3.JPG", "4.JPG", "5.jpg", 
      "6.jpg", "7.JPG", "8.JPG", "9.JPG", "10.jpg",
      "11.jpg", "12.jpg", "13.JPG", "14.JPG", "15.JPG",
      "16.jpg", "17.jpg", "18.JPG", "19.JPG", "20.JPG",
      "21.jpg", "22.jpg", "23.JPG", "24.JPG", "25.JPG",
      "26.JPG", "27.JPG", "28.JPG", "29.JPG", "30.JPG"
    ];

    const GALLERY_IMAGES = PHOTO_LIST.map(name => getImg(name));
    const WEDDING_DATE = new Date("2026-06-27T13:00:00");
    const P = { bg: "#FAFAFA", white: "#FFFFFF", black: "#262626", gray: "#8E8E8E", lightGray: "#DBDBDB", blue: "#0095F6", pink: "#ED4956", border: "#EFEFEF" };

    const HOBBY_SLIDES = [
      { img: "a.jpg", caption: "자다가 한 컷 찰칵!" },
      { img: "aa.jpg", caption: "" },
      { img: "aaa.jpg", caption: "" },
      { img: "aaaa.jpg", caption: "" }
    ];

    function FadeIn({ children, delay = 0, duration = 1 }) {
      const domRef = useRef();
      const [isVisible, setVisible] = useState(false);
      
      useEffect(() => {
        const observer = new IntersectionObserver(entries => {
          if (entries[0].isIntersecting) {
            setVisible(true);
            observer.unobserve(domRef.current);
          }
        }, { threshold: 0.1 });
        
        if (domRef.current) observer.observe(domRef.current);
        return () => observer.disconnect();
      }, []);

      return (
        <div ref={domRef} style={{ 
          opacity: isVisible ? 1 : 0, 
          transform: isVisible ? 'translateY(0)' : 'translateY(30px)', 
          transition: `opacity ${duration}s cubic-bezier(0.2, 0.8, 0.2, 1) ${delay}s, transform ${duration}s cubic-bezier(0.2, 0.8, 0.2, 1) ${delay}s` 
        }}>
          {children}
        </div>
      );
    }

    function StoryModal({ title, onClose, children }) {
      return (
        <div style={{ position: "fixed", inset: 0, zIndex: 2000, background: "rgba(0,0,0,0.85)", display: "flex", alignItems: "center", justifyContent: "center", flexDirection: "column", padding: 20, animation: "pop 0.3s ease" }}>
          <button onClick={onClose} style={{ position: "absolute", top: 20, right: 20, background: "none", border: "none", color: "white", fontSize: 30, cursor: "pointer", zIndex: 2001 }}>✕</button>
          <div style={{ background: P.white, width: "100%", maxWidth: 360, borderRadius: 16, padding: 24, boxSizing: "border-box", textAlign: "center", position: "relative", maxHeight: "80vh", overflowY: "auto" }}>
            {title && <h3 style={{ margin: "0 0 20px", fontSize: 18, color: P.black }}>{title}</h3>}
            {children}
          </div>
        </div>
      );
    }

    function Lightbox({ images, initialIndex, onClose }) {
      const [currentIndex, setCurrentIndex] = useState(initialIndex);
      const imgRef = useRef(null);
      const [scale, setScale] = useState(1);
      const [panning, setPanning] = useState(false);
      const [pointX, setPointX] = useState(0);
      const [pointY, setPointY] = useState(0);
      const [start, setStart] = useState({ x: 0, y: 0 });
      const [pinchStartDist, setPinchStartDist] = useState(null);
      const [baseScale, setBaseScale] = useState(1);

      useEffect(() => {
        setScale(1); setPointX(0); setPointY(0);
      }, [currentIndex]);

      const getDistance = (touches) => Math.hypot(touches[0].clientX - touches[1].clientX, touches[0].clientY - touches[1].clientY);

      const handleTouchStart = (e) => {
        if (e.touches.length === 2) { 
          setPinchStartDist(getDistance(e.touches)); setBaseScale(scale);
        } else if (e.touches.length === 1 && scale > 1) { 
          setPanning(true); setStart({ x: e.touches[0].clientX - pointX, y: e.touches[0].clientY - pointY });
        }
      };

      const handleTouchMove = (e) => {
        if (e.touches.length === 2 && pinchStartDist) { 
          const dist = getDistance(e.touches);
          const newScale = Math.min(Math.max(1, baseScale * (dist / pinchStartDist)), 4);
          setScale(newScale);
          if (newScale === 1) { setPointX(0); setPointY(0); }
        } else if (e.touches.length === 1 && panning && scale > 1) { 
          setPointX(e.touches[0].clientX - start.x); setPointY(e.touches[0].clientY - start.y);
        }
      };

      const handleTouchEnd = () => { setPanning(false); setPinchStartDist(null); };

      const handleWheel = (e) => { 
        if(imgRef.current && e.ctrlKey) {
          e.preventDefault();
          const xs = (e.clientX - pointX) / scale;
          const ys = (e.clientY - pointY) / scale;
          const delta = -e.deltaY;
          const newScale = delta > 0 ? scale * 1.2 : scale / 1.2;
          const limitedScale = Math.min(Math.max(1, newScale), 4);
          setScale(limitedScale); setPointX(e.clientX - xs * limitedScale); setPointY(e.clientY - ys * limitedScale);
        }
      }

      useEffect(() => {
        const img = imgRef.current;
        if (img) {
          img.addEventListener('wheel', handleWheel, { passive: false });
          return () => img.removeEventListener('wheel', handleWheel);
        }
      }, [scale, pointX, pointY]);

      return (
        <div style={{ position: "fixed", inset: 0, zIndex: 3000, background: "rgba(0,0,0,0.95)", display: "flex", flexDirection: "column", justifyContent: "center", touchAction: "none" }}
             onTouchStart={handleTouchStart} onTouchMove={handleTouchMove} onTouchEnd={handleTouchEnd}>
          <div style={{ position: "absolute", top: 20, right: 20, color: "white", fontSize: 30, cursor: "pointer", zIndex: 3010, padding: 10 }} onClick={onClose}>✕</div>
          <div style={{ position: "relative", width: "100%", height: "80vh", display: "flex", alignItems: "center", justifyContent: "center", overflow: "hidden" }}>
            {currentIndex > 0 && scale === 1 && <div onClick={() => setCurrentIndex(currentIndex - 1)} style={{ position: "absolute", left: 10, color: "white", fontSize: 40, cursor: "pointer", padding: 20, zIndex: 3005, touchAction: "manipulation" }}>‹</div>}
            <img ref={imgRef} src={images[currentIndex]} 
                 style={{ 
                   maxWidth: "100%", maxHeight: "100%", objectFit: "contain", transform: `translate(${pointX}px, ${pointY}px) scale(${scale})`,
                   transition: panning || pinchStartDist ? "none" : "transform 0.1s ease-out", touchAction: "none"
                 }} />
            {currentIndex < images.length - 1 && scale === 1 && <div onClick={() => setCurrentIndex(currentIndex + 1)} style={{ position: "absolute", right: 10, color: "white", fontSize: 40, cursor: "pointer", padding: 20, zIndex: 3005, touchAction: "manipulation" }}>›</div>}
          </div>
          <div style={{ padding: "10px", display: "flex", flexDirection:"column", gap: 5, justifyContent: "center", alignItems: "center", zIndex: 3005 }}>
            <span style={{ color: "white", fontSize: 14 }}>{currentIndex + 1} / {images.length}</span>
            <span style={{ color: "rgba(255,255,255,0.6)", fontSize: 11 }}>두 손가락으로 확대해서 보실 수 있습니다.</span>
          </div>
        </div>
      );
    }

    const QUIZ_DATA = [
      { q: "두 사람이 처음 만난 장소는?", options: ["학교 컴퓨터실", "영덕 고래불해수욕장", "전국노래자랑(영덕편)"], a: 0 },
      { q: "신랑이 신부에게 처음 반한 이유는?", options: ["밥을 너무 맛있게 먹어서", "일하는 모습이 멋져서", "얼굴에 빛이 나서"], a: 2 },
      { q: "두 사람이 사귄 첫 날 생긴 일은?", options: ["입술끼리 추돌사고", "버스와 추돌사고", "울산FC팀 팬과 추돌사고"], a: 1 },
      { q: "하민이의 고3 리즈시절 최대 몸무게는?", options: ["108kg", "78kg", "68kg"], a: 1 },
      { q: "신부가 신랑과 결혼을 다짐한 이유는? (모두 고르세요)", options: ["나의 버팀목이 되어주기 때문에", "내가 버팀목이 되어주고 싶기 때문에", "평생 붙어있고 싶어서"], a: [0, 1, 2], isMulti: true }
    ];

    function QuizModal({ onClose }) {
      const [step, setStep] = useState(0);
      const [score, setScore] = useState(0);
      const [status, setStatus] = useState(null); 
      const [confetti, setConfetti] = useState(false);
      const [selectedMulti, setSelectedMulti] = useState([]);

      const handleAnswer = (index) => {
        if (status !== null) return; 
        const q = QUIZ_DATA[step];

        if (q.isMulti) {
          const newSel = selectedMulti.includes(index) ? selectedMulti.filter(i => i !== index) : [...selectedMulti, index];
          setSelectedMulti(newSel);
          if (newSel.length === q.a.length && q.a.every(ans => newSel.includes(ans))) {
            setStatus('correct'); setScore(s => s + 1); setConfetti(true);
            setTimeout(() => { setStatus(null); setConfetti(false); setStep(s => s + 1); setSelectedMulti([]); }, 1500);
          }
          return;
        }

        if (index === q.a) { setStatus('correct'); setScore(s => s + 1); setConfetti(true); } else { setStatus('wrong'); }
        setTimeout(() => { setStatus(null); setConfetti(false); setStep(s => s + 1); }, 1500);
      };

      if (step >= QUIZ_DATA.length) {
        return (
          <StoryModal title="💯 TMI 모의고사 결과" onClose={onClose}>
            <div style={{ fontSize: 40, margin: "20px 0" }}>{score * 20}점!</div>
            <p style={{ fontSize: 14, lineHeight: 1.5 }}>
              {score === 5 ? "완벽해요! 저희를 정말 잘 아시네요 🥰" : score >= 3 ? "오~ 꽤 눈썰미가 좋으신데요? 😎" : "앞으로 더 많이 알아가요 우리! 😆"}
            </p>
            <button onClick={onClose} style={{ marginTop: 20, padding: "10px 20px", background: P.blue, color: "white", border: "none", borderRadius: 8, fontWeight: "bold" }}>확인</button>
          </StoryModal>
        );
      }

      const q = QUIZ_DATA[step];
      return (
        <StoryModal title={`💯 모의고사 (${step + 1}/${QUIZ_DATA.length})`} onClose={onClose}>
          {confetti && <div style={{ position: "fixed", inset: 0, fontSize: 30, pointerEvents: "none", animation: "confettiFall 2s linear", zIndex: 9999 }}>🎉🎊🌸</div>}
          <div className={status === 'wrong' ? 'shake' : ''}>
            <p style={{ fontSize: 15, marginBottom: 20, lineHeight: 1.4, fontWeight: 600 }}>Q. {q.q}</p>
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {q.options.map((opt, i) => {
                let bg = P.white; let color = P.black; let border = P.border; let opacity = 1;
                if (q.isMulti) { if (selectedMulti.includes(i)) { bg = "#e6f4ea"; border = "#137333"; color = "#137333"; } } 
                else if (status !== null) { if (i === q.a) { bg = "#e6f4ea"; color = "#137333"; border = "#137333"; } else if (status === 'wrong' && i !== q.a) { opacity = 0.5; } }
                return (
                  <button key={i} onClick={() => handleAnswer(i)} style={{ padding: "14px", borderRadius: 8, border: `1px solid ${border}`, background: bg, color: color, fontSize: 14, transition: "all 0.2s", opacity: opacity }}>
                    {i + 1}. {opt} {q.isMulti && selectedMulti.includes(i) ? "✔️" : ""}
                  </button>
                );
              })}
            </div>
            <div style={{ height: 30, marginTop: 12 }}>
              {status === 'wrong' && !q.isMulti && <p style={{ color: "red", fontSize: 14, fontWeight: "bold", margin: 0, animation: "pop 0.3s" }}>땡! 다시 생각해보세요 🤣</p>}
              {status === 'correct' && <p style={{ color: "#137333", fontSize: 14, fontWeight: "bold", margin: 0, animation: "pop 0.3s" }}>정답입니다! 🎉</p>}
              {q.isMulti && selectedMulti.length > 0 && selectedMulti.length < 3 && <p style={{ color: P.blue, fontSize: 13, margin: 0 }}>나머지 정답도 모두 골라주세요!</p>}
            </div>
          </div>
        </StoryModal>
      );
    }

    function HobbyModal({ onClose }) {
      const [slideIndex, setSlideIndex] = useState(0);
      const touchStartX = useRef(null);

      const handleTouchStart = (e) => { touchStartX.current = e.touches[0].clientX; };
      const handleTouchEnd = (e) => {
        if (touchStartX.current === null) return;
        const diff = touchStartX.current - e.changedTouches[0].clientX;
        if (diff > 50 && slideIndex < HOBBY_SLIDES.length - 1) setSlideIndex(slideIndex + 1);
        if (diff < -50 && slideIndex > 0) setSlideIndex(slideIndex - 1);
        touchStartX.current = null;
      };

      return (
        <StoryModal title="📸 우리의 일상" onClose={onClose}>
          <div style={{ position: "relative", overflow: "hidden", borderRadius: 8 }}
               onTouchStart={handleTouchStart} onTouchEnd={handleTouchEnd}>
            <div style={{ display: "flex", transition: "transform 0.3s ease", transform: `translateX(-${slideIndex * 100}%)` }}>
              {HOBBY_SLIDES.map((slide, i) => (
                <img key={i} src={getImg(slide.img)} style={{ width: "100%", flexShrink: 0, objectFit: "cover", aspectRatio: "1" }} alt={`일상 ${i+1}`} />
              ))}
            </div>
            {slideIndex > 0 && <div onClick={() => setSlideIndex(slideIndex - 1)} style={{ position: "absolute", left: 8, top: "50%", transform: "translateY(-50%)", background: "rgba(0,0,0,0.4)", color: "white", width: 32, height: 32, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", fontSize: 18 }}>‹</div>}
            {slideIndex < HOBBY_SLIDES.length - 1 && <div onClick={() => setSlideIndex(slideIndex + 1)} style={{ position: "absolute", right: 8, top: "50%", transform: "translateY(-50%)", background: "rgba(0,0,0,0.4)", color: "white", width: 32, height: 32, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", fontSize: 18 }}>›</div>}
          </div>
          <div style={{ display: "flex", justifyContent: "center", gap: 6, marginTop: 12 }}>
            {HOBBY_SLIDES.map((_, i) => (
              <div key={i} onClick={() => setSlideIndex(i)} style={{ width: 8, height: 8, borderRadius: "50%", background: i === slideIndex ? P.black : P.lightGray, cursor: "pointer", transition: "background 0.2s" }} />
            ))}
          </div>
          {HOBBY_SLIDES[slideIndex].caption && (
            <p style={{ fontSize: 14, lineHeight: 1.6, color: P.black, marginTop: 12 }}>{HOBBY_SLIDES[slideIndex].caption}</p>
          )}
        </StoryModal>
      );
    }

    function WeddingInvitation() {
      const [entered, setEntered] = useState(false);
      const [playing, setPlaying] = useState(false);
      const [modal, setModal] = useState(null); 
      const [expanded, setExpanded] = useState({});
      const [lightboxIndex, setLightboxIndex] = useState(null);
      const audioRef = useRef(null);
      const dDayDiff = Math.max(0, Math.ceil((WEDDING_DATE - new Date()) / 864e5));

      const [mainLiked, setMainLiked] = useState(false);
      const [hearts, setHearts] = useState([]);

      const [polls, setPolls] = useState({
        poll1: { title: "결혼식 당일, 누가 먼저 울까요?", opts: ["눈물 많은 신부", "눈물 없는 신랑", "양가 부모님"], votes: [0, 0, 0], voted: false },
        poll2: { title: "두 사람의 2세는 누구를 닮을까요?", opts: ["아빠 닮은 딸", "엄마 닮은 아들"], votes: [0, 0], voted: false }
      });
      
      const [entries, setEntries] = useState([]);
      const [guestName, setGuestName] = useState("");
      const [guestPw, setGuestPw] = useState("");
      const [guestMsg, setGuestMsg] = useState("");
      
      const [rsvpName, setRsvpName] = useState("");
      const [rsvpCompanion, setRsvpCompanion] = useState("0");

      useEffect(() => {
        fetch(`${DB_URL}/polls.json`).then(r => r.json()).then(data => {
          if (data) {
            setPolls(prev => ({
              poll1: { ...prev.poll1, votes: data.poll1 || [0, 0, 0] },
              poll2: { ...prev.poll2, votes: data.poll2 || [0, 0] }
            }));
          }
        }).catch(() => {});

        fetch(`${DB_URL}/guestbook.json`).then(r => r.json()).then(data => {
          if (data) {
            const loadedEntries = Object.keys(data).map(key => ({ id: key, ...data[key] }));
            loadedEntries.sort((a, b) => b.timestamp - a.timestamp);
            setEntries(loadedEntries);
          }
        }).catch(() => {});
      }, []);

      const enter = () => { setEntered(true); setPlaying(true); };
      const toggleExpand = (key) => setExpanded({ ...expanded, [key]: !expanded[key] });

      useEffect(() => {
        if (audioRef.current) { playing ? audioRef.current.play().catch(()=>{}) : audioRef.current.pause(); }
      }, [playing]);

      const handleVote = (pollKey, optIndex) => {
        if (polls[pollKey].voted) return;
        const newVotes = [...polls[pollKey].votes];
        newVotes[optIndex] += 1;
        setPolls(prev => ({ ...prev, [pollKey]: { ...prev[pollKey], votes: newVotes, voted: true } }));
        fetch(`${DB_URL}/polls.json`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ [pollKey]: newVotes }) });
      };

      const fetchMaskedIp = async () => {
        try {
          const res = await fetch('https://api.ipify.org?format=json');
          const data = await res.json();
          const parts = data.ip.split('.');
          return `${parts[0]}.${parts[1]}.***.***`;
        } catch(e) { return null; }
      };

      const submitGuestbook = async () => {
        if (!guestName.trim() || !guestMsg.trim() || !guestPw.trim()) {
          alert("이름, 비밀번호, 메시지를 모두 입력해주세요.");
          return;
        }
        const ip = await fetchMaskedIp();
        const newEntry = { name: guestName, msg: guestMsg, pw: guestPw, date: new Date().toLocaleDateString(), ip: ip, timestamp: Date.now() };
        fetch(`${DB_URL}/guestbook.json`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(newEntry) }).then(r => r.json()).then(data => {
          setEntries([{ id: data.name, ...newEntry }, ...entries]);
        });
        setGuestName(""); setGuestPw(""); setGuestMsg("");
      };

      const deleteGuestbook = (id, correctPw) => {
        const inputPw = prompt("등록할 때 입력한 비밀번호를 입력해주세요.");
        if (inputPw === null) return;
        if (inputPw === correctPw) {
          fetch(`${DB_URL}/guestbook/${id}.json`, { method: 'DELETE' })
            .then(() => {
              setEntries(entries.filter(e => e.id !== id));
              alert("성공적으로 삭제되었습니다.");
            });
        } else {
          alert("비밀번호가 일치하지 않습니다.");
        }
      };

      const submitRsvp = (status) => {
        if (!rsvpName.trim()) {
          alert("참석자 성함을 입력해주세요.");

            <StoryModal title="👋 하객분들께 인사해요" onClose={() => setModal(null)}>
              <div style={{ width: "100%", aspectRatio: "16/9", background: P.black, borderRadius: 8, overflow: "hidden", border: `1px solid ${P.border}` }}>
                <iframe width="100%" height="100%" src="https://www.youtube.com/embed/youtube.com/watch?si=hiXB9iXS6ilPUoJ_&v=VW-0ERSQDOo&feature=youtu.be" title="하객분들께 인사해요" frameBorder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowFullScreen></iframe>
              </div>
            </StoryModal>
          )}

          {lightboxIndex !== null && (
            <Lightbox images={GALLERY_IMAGES} initialIndex={lightboxIndex} onClose={() => setLightboxIndex(null)} />
          )}

          <div style={{ textAlign: "center", padding: "50px 0 30px", fontFamily: "'Playfair Display', serif", fontSize: 11, letterSpacing: ".2em", color: P.gray, borderTop: `1px solid ${P.border}`, marginTop: 20 }}>
            MINGYU & HAMIN <br/> 2026. 06. 27
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<WeddingInvitation />);
  </script>
</body>
</html>
